name: souled_space_application
description: "Souled Space - Mental Wellness App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  firebase_core: ^3.3.0
  firebase_auth: ^5.3.0
  firebase_database: ^11.1.0
  http: ^1.1.0 
  audioplayers: ^6.0.0
  flutter_dotenv: ^5.1.0
  uuid: ^4.3.3 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/logo.png

flutter_native_splash:
  color: "#F5F5DC"  # matches your UI (beige)
  image: assets/logo.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
